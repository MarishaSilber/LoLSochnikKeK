version: '3.8'

services:
  # PostgreSQL с поддержкой pgvector
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: vuzhub_user
      POSTGRES_PASSWORD: vuzhub_pass123
      POSTGRES_DB: vuzhub_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuzhub_user -d vuzhub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://vuzhub_user:vuzhub_pass123@db:5432/vuzhub_db
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Vite + React)
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  postgres_data:
