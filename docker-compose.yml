services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: vuzhub_user
      POSTGRES_PASSWORD: vuzhub_pass123
      POSTGRES_DB: vuzhub_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuzhub_user -d vuzhub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://vuzhub_user:vuzhub_pass123@db:5432/vuzhub_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
